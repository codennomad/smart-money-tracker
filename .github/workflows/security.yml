name: Security & Pentest CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Python static security analysis ───────────────────────────────────────
  bandit:
    name: Bandit (Python SAST)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install bandit
      - name: Run Bandit
        run: |
          bandit -r backend/app \
            -ll \
            --exclude backend/app/tests \
            -f json -o bandit-report.json || true
          bandit -r backend/app -ll --exclude backend/app/tests
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-report
          path: bandit-report.json

  # ── Python dependency CVE scan ─────────────────────────────────────────────
  pip-audit:
    name: pip-audit (Dependency CVEs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install pip-audit
      - name: Audit Python dependencies
        run: pip-audit -r backend/requirements.txt --strict

  # ── Node dependency CVE scan ───────────────────────────────────────────────
  npm-audit:
    name: npm audit (JS CVEs)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "22" }
      - run: npm ci
      - name: Audit npm dependencies
        run: npm audit --audit-level=high

  # ── Docker image scan ──────────────────────────────────────────────────────
  trivy:
    name: Trivy (Container CVEs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t smt-backend:ci ./backend
      - name: Run Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: smt-backend:ci
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH

  # ── Backend pentest suite ──────────────────────────────────────────────────
  pentest:
    name: Pentest Suite (OWASP coverage)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -r backend/requirements.txt
      - name: Run security tests
        run: |
          cd backend
          pytest tests/security/ -v --tb=short

  # ── OWASP ZAP dynamic scan ─────────────────────────────────────────────────
  zap:
    name: OWASP ZAP (Dynamic DAST)
    runs-on: ubuntu-latest
    needs: [pentest]
    steps:
      - uses: actions/checkout@v4
      - name: Start backend (SQLite mode for CI)
        run: |
          cd backend
          pip install -r requirements.txt
          SECRET_KEY=ci-test-key-not-prod \
          DATABASE_URL=sqlite+aiosqlite:///./test.db \
          REDIS_URL=redis://localhost:6379/0 \
          uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          sleep 5
      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: "http://localhost:8000"
          rules_file_name: ".zap/rules.tsv"
          fail_action: warn
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-report
          path: report_html.html
